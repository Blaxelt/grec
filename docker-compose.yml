services:

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://grec:grec@db:5432/grec
    depends_on:
      db:
        condition: service_healthy

  pipeline:
    profiles: [pipeline]
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    environment:
      - DATABASE_URL=postgresql://grec:grec@db:5432/grec
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: grec
      POSTGRES_PASSWORD: grec
      POSTGRES_DB: grec
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U grec -d grec
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: