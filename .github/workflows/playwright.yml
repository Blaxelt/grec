name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[backend]"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Start Database
        run: docker compose run -d --name grec-db -p 5432:5432 db

      - name: Wait for Database to be ready
        run: |
          until docker exec grec-db pg_isready -U grec -d grec; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Seed Database
        run: cat db/seed.sql | docker exec -i grec-db psql -v ON_ERROR_STOP=1 -U grec -d grec

      - name: Run Playwright tests
        working-directory: frontend
        env:
          DATABASE_URL: "postgresql://grec:grec@localhost:5432/grec"
          VITE_API_URL: "http://localhost:8000"
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
        # The frontend playwright.config.ts automatically spins up the backend and frontend
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
